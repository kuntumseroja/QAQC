# =============================================================================
# Nginx reverse proxy for QAQC4BI
#
# Replace qaqc4bi.example.com with your actual domain.
# After placing this file, run:
#   sudo certbot --nginx -d qaqc4bi.example.com
# to obtain and auto-configure SSL certificates.
# =============================================================================

upstream qaqc4bi_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name qaqc4bi.example.com;

    # Certbot will add a redirect to HTTPS here after running:
    #   certbot --nginx -d qaqc4bi.example.com

    location / {
        proxy_pass http://qaqc4bi_backend;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (used by Next.js HMR and potential real-time features)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Next.js static assets — long cache, proxy buffering on
    location /_next/static/ {
        proxy_pass http://qaqc4bi_backend;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, max-age=5184000, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # Limit upload size (adjust if your file processing needs larger uploads)
    client_max_body_size 50m;
}
