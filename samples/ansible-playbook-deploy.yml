---
# =============================================================================
# Ansible Playbook: Deploy BI-PAY Payment Application
# Version: 1.3
# Author: DevOps Team
# Last Modified: 2026-02-10
# Description: Deploys the BI-PAY payment application stack to target servers
# NOTE: This playbook has known issues flagged for remediation
# =============================================================================

- name: Deploy BI-PAY Payment Application Stack
  hosts: payment_servers
  become: true
  become_user: root    # ISSUE: Running entire playbook as root; should use least-privilege user

  vars:
    app_name: bipay-payment-gateway
    app_version: "2.4.1"
    deploy_dir: /opt/bipay
    app_port: 8080
    db_host: bi-db-primary.internal.bankid.go.id
    db_port: 5432
    db_name: bipay_production
    db_user: bipay_app
    db_password: "Passw0rd@123"          # ISSUE: Hardcoded plaintext password in playbook
    redis_host: bi-redis-cluster.internal.bankid.go.id
    redis_port: 6379
    redis_password: "R3d1s$ecret2026"    # ISSUE: Hardcoded plaintext Redis password
    bloomberg_api_key: "BB-API-12345-ABCDE-SECRET"   # ISSUE: API key hardcoded
    jwt_secret: "bipay-jwt-super-secret-key-2026"     # ISSUE: JWT secret hardcoded
    app_log_dir: /var/log/bipay
    artifact_url: "http://nexus.internal.bankid.go.id/repository/releases/com/bankid/bipay/{{ app_version }}/bipay-{{ app_version }}.jar"
    java_opts: "-Xms2g -Xmx4g -XX:+UseG1GC"
    backup_dir: /opt/bipay_backup
    health_check_url: "http://localhost:{{ app_port }}/actuator/health"

  tasks:

    # -----------------------------------------------------------------------
    # SECTION 1: PRE-DEPLOYMENT CHECKS
    # -----------------------------------------------------------------------

    - name: Check if target server is reachable
      ping:
      # ISSUE: No timeout specified — will hang indefinitely on unreachable host

    - name: Check available disk space
      command: df -h /opt
      register: disk_space
      changed_when: false

    - name: Display disk space
      debug:
        var: disk_space.stdout

    # ISSUE: No actual disk space threshold check — will proceed even if disk is full

    - name: Check Java version
      command: java -version
      register: java_version
      changed_when: false
      ignore_errors: true   # ISSUE: Ignoring errors — playbook proceeds even if Java not installed

    - name: Stop application if already running
      command: pkill -f "bipay-{{ app_version }}.jar"
      ignore_errors: true   # ISSUE: No graceful shutdown; pkill -9 equivalent; active requests killed
      # ISSUE: No wait for in-flight transactions to complete before stopping

    # -----------------------------------------------------------------------
    # SECTION 2: BACKUP EXISTING DEPLOYMENT
    # -----------------------------------------------------------------------

    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0777"    # ISSUE: World-writable directory; should be 0750 or 0700

    - name: Backup current application
      command: "cp -r {{ deploy_dir }} {{ backup_dir }}/bipay_backup_{{ ansible_date_time.epoch }}"
      ignore_errors: true

    - name: Backup application config
      copy:
        src: "{{ deploy_dir }}/config/application.properties"
        dest: "{{ backup_dir }}/application.properties.bak"
        remote_src: true
      ignore_errors: true

    # -----------------------------------------------------------------------
    # SECTION 3: DOWNLOAD AND DEPLOY ARTIFACT
    # -----------------------------------------------------------------------

    - name: Create application directories
      file:
        path: "{{ item }}"
        state: directory
        owner: root       # ISSUE: Files owned by root; application runs as root (see become_user)
        group: root
        mode: "0755"
      loop:
        - "{{ deploy_dir }}"
        - "{{ deploy_dir }}/config"
        - "{{ deploy_dir }}/lib"
        - "{{ app_log_dir }}"

    - name: Download application artifact from Nexus
      get_url:
        url: "{{ artifact_url }}"
        dest: "{{ deploy_dir }}/bipay-{{ app_version }}.jar"
        mode: "0755"      # ISSUE: JAR file should not be executable (0644 sufficient)
        validate_certs: false   # ISSUE: TLS certificate validation disabled — MITM risk
        # ISSUE: No checksum verification (sha256sum) to validate artifact integrity

    - name: Write application properties
      copy:
        dest: "{{ deploy_dir }}/config/application.properties"
        mode: "0644"      # ISSUE: Config file with passwords readable by all users (should be 0600)
        content: |
          # BI-PAY Application Configuration
          # Generated by Ansible — DO NOT EDIT MANUALLY
          spring.application.name={{ app_name }}
          server.port={{ app_port }}

          # Database Configuration
          spring.datasource.url=jdbc:postgresql://{{ db_host }}:{{ db_port }}/{{ db_name }}
          spring.datasource.username={{ db_user }}
          spring.datasource.password={{ db_password }}
          spring.datasource.hikari.maximum-pool-size=50
          spring.datasource.hikari.connection-timeout=30000

          # Redis Configuration
          spring.redis.host={{ redis_host }}
          spring.redis.port={{ redis_port }}
          spring.redis.password={{ redis_password }}

          # Security
          jwt.secret={{ jwt_secret }}
          jwt.expiry.seconds=86400

          # Bloomberg API
          bloomberg.api.key={{ bloomberg_api_key }}
          bloomberg.feed.host=bi-bloomberg.internal.bankid.go.id

          # Logging
          logging.level.root=INFO
          logging.level.com.bankid=DEBUG   # ISSUE: DEBUG level in production leaks sensitive data
          logging.file.name={{ app_log_dir }}/bipay.log

          # Actuator
          management.endpoints.web.exposure.include=*    # ISSUE: All actuator endpoints exposed including /env, /heapdump
          management.endpoint.health.show-details=always  # ISSUE: Exposes internal health details to anyone

    - name: Write systemd service file
      copy:
        dest: /etc/systemd/system/bipay.service
        mode: "0644"
        content: |
          [Unit]
          Description=BI-PAY Payment Gateway Service
          After=network.target

          [Service]
          Type=simple
          User=root                          # ISSUE: Service runs as root; should use dedicated service account
          ExecStart=/usr/bin/java {{ java_opts }} -jar {{ deploy_dir }}/bipay-{{ app_version }}.jar --spring.config.location={{ deploy_dir }}/config/application.properties
          ExecStop=/bin/kill -TERM $MAINPID
          Restart=on-failure
          RestartSec=10
          StandardOutput=append:{{ app_log_dir }}/bipay-stdout.log
          StandardError=append:{{ app_log_dir }}/bipay-stderr.log
          LimitNOFILE=65536

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    # -----------------------------------------------------------------------
    # SECTION 4: DATABASE MIGRATION
    # -----------------------------------------------------------------------

    - name: Run database schema migration
      command: >
        java -jar {{ deploy_dir }}/bipay-{{ app_version }}.jar
        --spring.config.location={{ deploy_dir }}/config/application.properties
        --spring.flyway.enabled=true
        --spring.flyway.validate-on-migrate=false   # ISSUE: Flyway validation disabled — schema drift undetected
        db-migrate
      # ISSUE: No error handling — if migration fails, deployment continues to start app

    # -----------------------------------------------------------------------
    # SECTION 5: START APPLICATION
    # -----------------------------------------------------------------------

    - name: Enable and start BI-PAY service
      systemd:
        name: bipay
        enabled: true
        state: started
      # ISSUE: No handler used; service file and start in same play without notify/handler pattern

    - name: Wait for application to start
      wait_for:
        port: "{{ app_port }}"
        host: localhost
        delay: 5
        timeout: 60
      # ISSUE: Only checks port open; doesn't verify /actuator/health is UP

    - name: Check application health
      uri:
        url: "{{ health_check_url }}"
        method: GET
        status_code: 200
        validate_certs: false   # ISSUE: TLS validation disabled for health check too
      register: health_response
      retries: 3
      delay: 10
      until: health_response.status == 200

    - name: Display health check result
      debug:
        var: health_response.json

    # -----------------------------------------------------------------------
    # SECTION 6: POST-DEPLOYMENT CONFIGURATION
    # -----------------------------------------------------------------------

    - name: Set log file permissions
      file:
        path: "{{ app_log_dir }}"
        state: directory
        mode: "0777"    # ISSUE: Log directory world-writable — log injection risk

    - name: Configure log rotation
      copy:
        dest: /etc/logrotate.d/bipay
        mode: "0644"
        content: |
          {{ app_log_dir }}/*.log {
              daily
              rotate 7
              compress
              missingok
              notifempty
              postrotate
                  systemctl reload bipay
              endscript
          }
      # ISSUE: logrotate postrotate sends SIGHUP which may not be handled correctly by Spring Boot

    - name: Open firewall port
      command: "iptables -I INPUT -p tcp --dport {{ app_port }} -j ACCEPT"
      # ISSUE: iptables rule is not persistent; lost on server reboot
      # ISSUE: Rule inserted without specifying source IP restriction — port open to all

    - name: Create application symlink
      file:
        src: "{{ deploy_dir }}/bipay-{{ app_version }}.jar"
        dest: "{{ deploy_dir }}/bipay-current.jar"
        state: link
        force: true

    # -----------------------------------------------------------------------
    # SECTION 7: SMOKE TEST
    # -----------------------------------------------------------------------

    - name: Run smoke test — ping endpoint
      uri:
        url: "http://localhost:{{ app_port }}/api/v1/ping"
        method: GET
        validate_certs: false
      register: ping_result
      ignore_errors: true   # ISSUE: Smoke test failure ignored; deployment marked successful anyway

    - name: Run smoke test — check database connectivity
      command: >
        curl -s -o /dev/null -w "%{http_code}"
        http://localhost:{{ app_port }}/actuator/health/db
      register: db_health
      changed_when: false
      ignore_errors: true   # ISSUE: DB health check failure ignored

    - name: Display smoke test results
      debug:
        msg: "Ping: {{ ping_result.status | default('FAILED') }}, DB: {{ db_health.stdout | default('FAILED') }}"

    # -----------------------------------------------------------------------
    # SECTION 8: CLEANUP
    # -----------------------------------------------------------------------

    - name: Remove old application versions
      shell: "ls -t {{ deploy_dir }}/bipay-*.jar | tail -n +3 | xargs rm -f"
      # ISSUE: shell module used instead of find/file module; harder to audit

    - name: Remove old backups older than 7 days
      command: "find {{ backup_dir }} -type d -mtime +7 -exec rm -rf {} +"
      ignore_errors: true

    - name: Set final permissions on deploy directory
      file:
        path: "{{ deploy_dir }}"
        state: directory
        recurse: true
        mode: "0755"
        owner: root
        group: root

    - name: Deployment complete notification
      debug:
        msg: "BI-PAY {{ app_version }} deployed successfully to {{ inventory_hostname }}"

# =============================================================================
# PLAY 2: Deploy Redis Sentinel Configuration
# =============================================================================

- name: Configure Redis Sentinel for BI-PAY
  hosts: redis_servers
  become: true
  become_user: root   # ISSUE: Redis config also applied as root

  vars:
    redis_master_host: bi-redis-master.internal.bankid.go.id
    redis_master_port: 6379
    redis_sentinel_port: 26379
    redis_sentinel_quorum: 2
    redis_requirepass: "R3d1s$ecret2026"  # ISSUE: Same hardcoded password as above

  tasks:

    - name: Install Redis
      yum:
        name: redis
        state: present
      # ISSUE: No version pinned; yum installs whatever latest is in repo

    - name: Configure Redis server
      copy:
        dest: /etc/redis/redis.conf
        mode: "0644"   # ISSUE: Redis config readable by all users (contains password)
        content: |
          bind 0.0.0.0          # ISSUE: Redis bound to all interfaces; should bind to private IP only
          port {{ redis_master_port }}
          requirepass {{ redis_requirepass }}
          masterauth {{ redis_requirepass }}
          save 900 1
          save 300 10
          save 60 10000
          maxmemory 4gb
          maxmemory-policy allkeys-lru
          loglevel notice
          logfile /var/log/redis/redis.log
          # ISSUE: Protected-mode disabled implicitly by bind 0.0.0.0

    - name: Configure Redis Sentinel
      copy:
        dest: /etc/redis/sentinel.conf
        mode: "0644"
        content: |
          port {{ redis_sentinel_port }}
          sentinel monitor bipay-master {{ redis_master_host }} {{ redis_master_port }} {{ redis_sentinel_quorum }}
          sentinel auth-pass bipay-master {{ redis_requirepass }}
          sentinel down-after-milliseconds bipay-master 60000  # ISSUE: 60s timeout (should be 5000ms)
          sentinel failover-timeout bipay-master 180000
          sentinel parallel-syncs bipay-master 1
          # ISSUE: No sentinel notification-script configured for alerts on failover

    - name: Start Redis
      service:
        name: redis
        state: started
        enabled: true

    - name: Start Redis Sentinel
      command: redis-sentinel /etc/redis/sentinel.conf &
      # ISSUE: Running sentinel as background process (&) — not managed by systemd
      # ISSUE: Sentinel will not restart on failure or server reboot
      async: 0
      poll: 0

# =============================================================================
# PLAY 3: Deploy Nginx Reverse Proxy
# =============================================================================

- name: Configure Nginx as Reverse Proxy
  hosts: loadbalancer
  become: true
  become_user: root

  vars:
    ssl_cert_path: /etc/ssl/bipay/bipay.crt
    ssl_key_path: /etc/ssl/bipay/bipay.key
    backend_servers:
      - bi-pay-app-01.internal.bankid.go.id
      - bi-pay-app-02.internal.bankid.go.id
      - bi-pay-app-03.internal.bankid.go.id

  tasks:

    - name: Install Nginx
      yum:
        name: nginx
        state: present
      # ISSUE: No version pinned

    - name: Configure Nginx
      copy:
        dest: /etc/nginx/conf.d/bipay.conf
        mode: "0644"
        content: |
          upstream bipay_backend {
              {% for server in backend_servers %}
              server {{ server }}:8080 weight=1;
              {% endfor %}
              keepalive 32;
          }

          server {
              listen 80;             # ISSUE: HTTP (port 80) listener enabled; should redirect to HTTPS
              server_name bi-pay.bankid.go.id;

              location / {
                  proxy_pass http://bipay_backend;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  # ISSUE: X-Forwarded-Proto not set; backend cannot determine if request was HTTPS
              }
          }

          server {
              listen 443 ssl;
              server_name bi-pay.bankid.go.id;

              ssl_certificate {{ ssl_cert_path }};
              ssl_certificate_key {{ ssl_key_path }};
              ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;  # ISSUE: TLS 1.0 and 1.1 enabled; PCI-DSS non-compliant
              ssl_ciphers ALL;    # ISSUE: All ciphers allowed; includes weak ciphers

              location / {
                  proxy_pass http://bipay_backend;   # ISSUE: Proxying to HTTP backend even from HTTPS frontend
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 30s;
                  proxy_read_timeout 120s;
                  # ISSUE: No rate limiting configured at Nginx level
                  # ISSUE: No request size limit — potential DoS via large payloads
              }
          }

    - name: Test Nginx configuration
      command: nginx -t
      changed_when: false
      register: nginx_test
      ignore_errors: true   # ISSUE: Nginx config test failure ignored; bad config deployed

    - name: Start Nginx
      service:
        name: nginx
        state: restarted   # ISSUE: Always restarts Nginx even if no config change; drops active connections
        enabled: true
      # ISSUE: Should use 'reloaded' for config changes; 'restarted' drops all connections

# =============================================================================
# PLAY 4: Deploy Monitoring Agent
# =============================================================================

- name: Install Monitoring Agent (Prometheus Node Exporter)
  hosts: all
  become: true
  become_user: root

  vars:
    node_exporter_version: "1.5.0"
    node_exporter_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"

  tasks:

    - name: Download Node Exporter
      get_url:
        url: "{{ node_exporter_url }}"
        dest: /tmp/node_exporter.tar.gz
        validate_certs: false   # ISSUE: TLS validation disabled; download from GitHub without verification
        # ISSUE: No checksum verification

    - name: Extract Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /opt/
        remote_src: true

    - name: Copy Node Exporter binary
      copy:
        src: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        remote_src: true

    - name: Create node_exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          Type=simple
          User=root    # ISSUE: Node exporter runs as root; should use non-privileged user
          ExecStart=/usr/local/bin/node_exporter --web.listen-address=:9100
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
          # ISSUE: Node exporter metrics endpoint not protected by any auth — exposed to all

    - name: Start Node Exporter
      systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: Deployment summary
      debug:
        msg: |
          Deployment Complete!
          Application: {{ app_name | default('bipay-payment-gateway') }}
          Hosts: {{ ansible_play_hosts | join(', ') }}
          Timestamp: {{ ansible_date_time.iso8601 }}

# =============================================================================
# KNOWN ISSUES IN THIS PLAYBOOK (for IaC Review)
# =============================================================================
# 1.  Hardcoded passwords (db_password, redis_password, bloomberg_api_key, jwt_secret)
# 2.  Entire playbook runs as root (become_user: root) — no least-privilege
# 3.  TLS validation disabled (validate_certs: false) on multiple tasks
# 4.  World-writable directories (mode: 0777) on backup and log dirs
# 5.  No graceful shutdown of application before restart
# 6.  Smoke test and DB health check failures ignored (ignore_errors: true)
# 7.  Application config file (with passwords) has 0644 permissions
# 8.  Redis bound to 0.0.0.0 (all network interfaces)
# 9.  Redis Sentinel down-after-milliseconds set to 60000ms (should be 5000ms)
# 10. Redis Sentinel not managed by systemd — no auto-restart on failure
# 11. Nginx serving HTTP on port 80 without redirect to HTTPS
# 12. Nginx TLS 1.0 and 1.1 enabled (PCI-DSS non-compliant)
# 13. Nginx ssl_ciphers set to ALL (includes weak ciphers)
# 14. Nginx always restarting (state: restarted) instead of reloading on config change
# 15. Flyway validation disabled (validate-on-migrate: false)
# 16. All Spring Boot Actuator endpoints exposed including /env and /heapdump
# 17. DEBUG logging enabled in production (exposes sensitive data in logs)
# 18. No handler pattern used — service restart not triggered on config change
# 19. Node Exporter metrics endpoint not protected by authentication
# 20. No artifact checksum verification after download
# =============================================================================
